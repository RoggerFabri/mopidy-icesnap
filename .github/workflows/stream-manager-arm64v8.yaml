name: stream-manager-arm64v8
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
    paths:
      - "stream-manager/**"
  push:
    branches:
      - "master"
    paths:
      - "stream-manager/**"

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          push: ${{ github.event_name != 'pull_request' }}
          context: "${{ github.server_url }}/${{ github.repository }}.git#${{ github.ref }}:stream-manager"
          tags: |
            ${{ secrets.DOCKERHUB_SLUG }}/stream-manager:arm64v8-latest
            ${{ secrets.DOCKERHUB_SLUG }}/stream-manager:arm64v8-${{github.run_number}}
          platforms: linux/arm64
          provenance: true
          sbom: true
          cache-from: type=gha,scope=stream-manager-arm64
          cache-to: type=gha,mode=max,scope=stream-manager-arm64
